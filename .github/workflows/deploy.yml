name: CP Agenda Pro - Deploy Automático

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Dependências e Build (Frontend)
      run: |
        npm install
        npm run build

    - name: Configurar PHP (Para o Firewall)
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2

    - name: Instalar dependências completas (para o Firewall)
      working-directory: ./backend
      run: composer install --optimize-autoloader --ignore-platform-reqs --no-interaction

    - name: Run Static Analysis (PHPStan Firewall)
      working-directory: ./backend
      run: ./vendor/bin/phpstan analyse --error-format=github

    - name: Limpar pastas de Dev antes do deploy
      working-directory: ./backend
      run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-interaction

    - name: Gerar arquivo .env de produção
      env:
        SECRET_DB_HOST: ${{ secrets.DB_HOST }}
        SECRET_DB_PORT: ${{ secrets.DB_PORT }}
        SECRET_DB_NAME: ${{ secrets.DB_NAME }}
        SECRET_DB_USER: ${{ secrets.DB_USER }}
        SECRET_DB_PASS: ${{ secrets.DB_PASS }}
        SECRET_TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        echo "DB_HOST=${SECRET_DB_HOST}" > backend/.env
        echo "DB_PORT=${SECRET_DB_PORT}" >> backend/.env
        echo "DB_NAME=${SECRET_DB_NAME}" >> backend/.env
        echo "DB_USER=${SECRET_DB_USER}" >> backend/.env
        echo "DB_PASS=${SECRET_DB_PASS}" >> backend/.env
        echo "DB_CHARSET=utf8mb4" >> backend/.env
        echo "API_VERSION=1.0.0" >> backend/.env
        echo "DEBUG_MODE=false" >> backend/.env
        echo "TELEGRAM_BOT_TOKEN=${SECRET_TELEGRAM}" >> backend/.env
        echo "Linhas no .env: $(wc -l < backend/.env)"

    - name: Preparar Pacotes de Deploy
      run: |
        cd dist && zip -r ../dist.zip * && cd ..
        cd backend && zip -r ../backend.zip api database migrate.php .env && cd ..

    - name: Testar Conexão SSH
      run: nc -zv -w 10 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} || echo "Sem resposta SSH"

    - name: Enviar Arquivos via SCP (Hostinger)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        timeout: 120s
        command_timeout: 10m
        source: "dist.zip,backend.zip"
        target: "domains/creativeprintjp.com/public_html/cpagendapro/"

    - name: Executar Comandos SSH (Unzip e Migrations)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd domains/creativeprintjp.com/public_html/cpagendapro/
          mkdir -p backup_viva
          cp -r api database index.html assets backup_viva/ 2>/dev/null || true
          unzip -o backend.zip && rm backend.zip
          chmod 644 .env
          php migrate.php
          unzip -o dist.zip && rm dist.zip
          echo "Deploy concluido com sucesso!"
