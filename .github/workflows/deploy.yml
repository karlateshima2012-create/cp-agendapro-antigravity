name: CP Agenda Pro - Deploy Automático

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Dependências e Build (Frontend)
      run: |
        npm install
        npm run build

    - name: Configurar PHP (Para o Firewall)
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2

    - name: Instalar dependências completas (para o Firewall)
      working-directory: ./backend
      run: composer install --optimize-autoloader --ignore-platform-reqs --no-interaction

    - name: Run Static Analysis (PHPStan Firewall)
      working-directory: ./backend
      run: |
        ./vendor/bin/phpstan analyse --error-format=github

    - name: Limpar pastas de Dev antes do deploy
      working-directory: ./backend
      run: |
        composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-interaction

    - name: Gerar arquivo .env de produção
      # ✅ FIX CRÍTICO: Secrets expostos como env vars do step ANTES do shell processar.
      # Isso evita que caracteres especiais como $ na senha sejam interpretados pelo bash.
      env:
        _DB_HOST: ${{ secrets.DB_HOST }}
        _DB_PORT: ${{ secrets.DB_PORT }}
        _DB_NAME: ${{ secrets.DB_NAME }}
        _DB_USER: ${{ secrets.DB_USER }}
        _DB_PASS: ${{ secrets.DB_PASS }}
        _TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        # Usando env vars do step (valores literais, sem interpretação de $)
        # O heredoc SEM aspas expande variáveis de ambiente — seguro pois $4 em $_DB_PASS
        # NÃO é reinterpretado, o shell expande apenas ${_DB_PASS}
        cat > backend/.env << ENVEOF
DB_HOST=${_DB_HOST}
DB_PORT=${_DB_PORT}
DB_NAME=${_DB_NAME}
DB_USER=${_DB_USER}
DB_PASS=${_DB_PASS}
DB_CHARSET=utf8mb4
API_VERSION=1.0.0
DEBUG_MODE=false
TELEGRAM_BOT_TOKEN=${_TELEGRAM_BOT_TOKEN}
ENVEOF
        echo "✅ .env gerado com $(wc -l < backend/.env) linhas"
        # Loga apenas as chaves para verificação (nunca os valores)
        cut -d= -f1 backend/.env

    - name: Preparar Pacotes de Deploy
      run: |
        cd dist && zip -r ../dist.zip * && cd ..
        cd backend && zip -r ../backend.zip api database migrate.php .env && cd ..

    - name: Testar Conexão SSH
      run: |
        nc -zv -w 10 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} || echo "⚠️ Sem resposta SSH"

    - name: Enviar Arquivos via SCP (Hostinger)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        timeout: 120s
        command_timeout: 10m
        source: "dist.zip,backend.zip"
        target: "domains/creativeprintjp.com/public_html/cpagendapro/"

    - name: Executar Comandos SSH (Unzip, Migrations)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd domains/creativeprintjp.com/public_html/cpagendapro/

          mkdir -p backup_viva
          cp -r api database index.html assets backup_viva/ 2>/dev/null || true

          unzip -o backend.zip
          rm backend.zip

          chmod 644 .env

          php migrate.php

          unzip -o dist.zip
          rm dist.zip

          echo "✅ Deploy Finalizado com Sucesso!"
